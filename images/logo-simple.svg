<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cubeGlow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="orangeGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="bgGrad" cx="50%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#0f2a38"/>
      <stop offset="45%" stop-color="#0a1c28"/>
      <stop offset="100%" stop-color="#060c12"/>
    </radialGradient>
  </defs>

  <rect width="256" height="256" rx="52" fill="url(#bgGrad)"/>

  <!-- Left cluster (simplified - 3 nodes, triangle) -->
  <g stroke="#3a6575" stroke-width="0.8" opacity="0.3">
    <line x1="32" y1="88" x2="58" y2="72"/>
    <line x1="58" y1="72" x2="68" y2="100"/>
    <line x1="32" y1="88" x2="68" y2="100"/>
    <line x1="32" y1="88" x2="44" y2="118"/>
    <line x1="68" y1="100" x2="44" y2="118"/>
  </g>

  <g filter="url(#orangeGlow)"><circle cx="32" cy="88" r="4" fill="#ff9800"/></g>
  <circle cx="32" cy="88" r="4" fill="#ff9800"/>
  <circle cx="32" cy="88" r="1.5" fill="#ffd080"/>

  <g filter="url(#orangeGlow)"><circle cx="68" cy="100" r="3.5" fill="#ff9800"/></g>
  <circle cx="68" cy="100" r="3.5" fill="#ff9800"/>
  <circle cx="68" cy="100" r="1.2" fill="#ffd080"/>

  <g filter="url(#glow)"><circle cx="58" cy="72" r="3.5" fill="#00e5ff"/></g>
  <circle cx="58" cy="72" r="3.5" fill="#00e5ff"/>
  <circle cx="58" cy="72" r="1.3" fill="#ffffff"/>

  <g filter="url(#glow)"><circle cx="44" cy="118" r="3" fill="#00e5ff"/></g>
  <circle cx="44" cy="118" r="3" fill="#00e5ff"/>
  <circle cx="44" cy="118" r="1" fill="#ffffff"/>


  <!-- Right cluster (simplified) -->
  <g stroke="#3a6575" stroke-width="0.8" opacity="0.3">
    <line x1="194" y1="78" x2="220" y2="88"/>
    <line x1="220" y1="88" x2="210" y2="110"/>
    <line x1="194" y1="78" x2="190" y2="102"/>
    <line x1="190" y1="102" x2="210" y2="110"/>
    <line x1="210" y1="110" x2="224" y2="124"/>
  </g>

  <g filter="url(#orangeGlow)"><circle cx="220" cy="88" r="4" fill="#ff9800"/></g>
  <circle cx="220" cy="88" r="4" fill="#ff9800"/>
  <circle cx="220" cy="88" r="1.5" fill="#ffd080"/>

  <g filter="url(#orangeGlow)"><circle cx="210" cy="110" r="3.5" fill="#ff9800"/></g>
  <circle cx="210" cy="110" r="3.5" fill="#ff9800"/>
  <circle cx="210" cy="110" r="1.2" fill="#ffd080"/>

  <g filter="url(#glow)"><circle cx="194" cy="78" r="3.5" fill="#00e5ff"/></g>
  <circle cx="194" cy="78" r="3.5" fill="#00e5ff"/>
  <circle cx="194" cy="78" r="1.3" fill="#ffffff"/>

  <g filter="url(#glow)"><circle cx="190" cy="102" r="3" fill="#00e5ff"/></g>
  <circle cx="190" cy="102" r="3" fill="#00e5ff"/>
  <circle cx="190" cy="102" r="1" fill="#ffffff"/>

  <g filter="url(#glow)"><circle cx="224" cy="124" r="3" fill="#00e5ff"/></g>
  <circle cx="224" cy="124" r="3" fill="#00e5ff"/>
  <circle cx="224" cy="124" r="1" fill="#ffffff"/>


  <!-- Central cube -->
  <g transform="translate(128, 100)" filter="url(#cubeGlow)">
    <polygon points="0,-28 32,-14 0,4 -32,-14" fill="#0a1a28" stroke="#00e5ff" stroke-width="1.8" stroke-linejoin="round"/>
    <polygon points="-32,-14 0,4 0,37 -32,20" fill="#071218" stroke="#00e5ff" stroke-width="1.8" stroke-linejoin="round"/>
    <polygon points="32,-14 0,4 0,37 32,20" fill="#050e14" stroke="#00e5ff" stroke-width="1.8" stroke-linejoin="round"/>
  </g>

  <!-- Apex node -->
  <g filter="url(#cubeGlow)"><circle cx="128" cy="72" r="4" fill="#00e5ff"/></g>
  <circle cx="128" cy="72" r="4" fill="#00e5ff"/>
  <circle cx="128" cy="72" r="2" fill="#ffffff"/>

  <!-- WiFi arcs -->
  <g transform="translate(128, 67)">
    <path d="M -5,-4 Q 0,-9 5,-4" fill="none" stroke="#00e5ff" stroke-width="1.5" stroke-linecap="round" opacity="0.75"/>
    <path d="M -10,-7 Q 0,-16 10,-7" fill="none" stroke="#00e5ff" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Wordmark -->
  <text x="128" y="172" text-anchor="middle" font-family="DejaVu Sans, Liberation Sans, Arial, sans-serif" font-size="28" letter-spacing="0.5">
    <tspan fill="#ffffff" font-weight="700">Node</tspan><tspan fill="#00e5ff" font-weight="300">Control</tspan>
  </text>

  <!-- Tagline -->
  <text x="128" y="192" text-anchor="middle" font-family="DejaVu Sans, Liberation Sans, Arial, sans-serif" font-weight="300" font-size="9.5" fill="#6a8a9a" letter-spacing="4">AUTOMATE  EVERYTHING</text>

</svg>