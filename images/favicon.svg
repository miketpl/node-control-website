<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#0f2a38"/>
      <stop offset="45%" stop-color="#0a1c28"/>
      <stop offset="100%" stop-color="#060c12"/>
    </radialGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#bgGrad)"/>

  <!-- Tiny left cluster hint -->
  <g stroke="#3a6575" stroke-width="0.6" opacity="0.3">
    <line x1="10" y1="24" x2="17" y2="19"/>
    <line x1="17" y1="19" x2="20" y2="28"/>
    <line x1="10" y1="24" x2="20" y2="28"/>
  </g>
  <circle cx="10" cy="24" r="2" fill="#ff9800"/>
  <circle cx="17" cy="19" r="1.8" fill="#00e5ff"/>
  <circle cx="20" cy="28" r="1.8" fill="#ff9800"/>

  <!-- Tiny right cluster hint -->
  <g stroke="#3a6575" stroke-width="0.6" opacity="0.3">
    <line x1="45" y1="20" x2="53" y2="24"/>
    <line x1="53" y1="24" x2="48" y2="30"/>
    <line x1="45" y1="20" x2="48" y2="30"/>
  </g>
  <circle cx="53" cy="24" r="2" fill="#ff9800"/>
  <circle cx="45" cy="20" r="1.8" fill="#00e5ff"/>
  <circle cx="48" cy="30" r="1.8" fill="#00e5ff"/>

  <!-- Central cube (bold at small size) -->
  <g transform="translate(32, 28)">
    <polygon points="0,-10 11,-5 0,2 -11,-5" fill="#0a1a28" stroke="#00e5ff" stroke-width="1.6" stroke-linejoin="round"/>
    <polygon points="-11,-5 0,2 0,13 -11,7" fill="#071218" stroke="#00e5ff" stroke-width="1.6" stroke-linejoin="round"/>
    <polygon points="11,-5 0,2 0,13 11,7" fill="#050e14" stroke="#00e5ff" stroke-width="1.6" stroke-linejoin="round"/>
  </g>

  <!-- Apex node -->
  <circle cx="32" cy="18" r="2.5" fill="#00e5ff"/>
  <circle cx="32" cy="18" r="1.2" fill="#ffffff"/>

  <!-- WiFi arc -->
  <path d="M 28,14.5 Q 32,10 36,14.5" fill="none" stroke="#00e5ff" stroke-width="1.2" stroke-linecap="round" opacity="0.65"/>

  <!-- Tiny wordmark at bottom -->
  <text x="32" y="52" text-anchor="middle" font-family="DejaVu Sans, Liberation Sans, Arial, sans-serif" font-size="6.5" letter-spacing="0.2">
    <tspan fill="#ffffff" font-weight="700">N</tspan><tspan fill="#00e5ff" font-weight="300">C</tspan>
  </text>
</svg>